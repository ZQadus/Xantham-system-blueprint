name: CHECKSUMS drift check

# Fails CI on any commit that changes a tracked blueprint file without
# regenerating CHECKSUMS.sha256. Closes the silent-stale-manifest gap
# that bit us twice in 36h on 2026-05-10/11.
#
# Maintainer workflow: run `bash scripts/update-checksums.sh` before
# committing edits to any of the tracked files. The pre-commit symlink
# documented in scripts/update-checksums.sh automates this locally.
# This CI job is the safety net.

on:
  push:
    branches: [main]
    paths:
      - 'xantham-system-v31.md'
      - 'xantham-templates-v31.md'
      - 'README.md'
      - 'LICENSE'
      - 'SECURITY.md'
      - 'ARCHITECTURE.md'
      - 'COMPARISON.md'
      - 'CHECKSUMS.sha256'
      - 'scripts/update-checksums.sh'
      - 'scripts/verify-blueprint.sh'
      - '.github/workflows/checksums.yml'
  pull_request:
    paths:
      - 'xantham-system-v31.md'
      - 'xantham-templates-v31.md'
      - 'README.md'
      - 'LICENSE'
      - 'SECURITY.md'
      - 'ARCHITECTURE.md'
      - 'COMPARISON.md'
      - 'CHECKSUMS.sha256'
      - 'scripts/update-checksums.sh'
      - 'scripts/verify-blueprint.sh'

jobs:
  verify-checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate checksums in a scratch copy
        run: |
          cp CHECKSUMS.sha256 /tmp/CHECKSUMS.committed
          bash scripts/update-checksums.sh
          mv CHECKSUMS.sha256 /tmp/CHECKSUMS.regenerated
          cp /tmp/CHECKSUMS.committed CHECKSUMS.sha256

      - name: Diff committed vs regenerated
        run: |
          if ! diff -q /tmp/CHECKSUMS.committed /tmp/CHECKSUMS.regenerated >/dev/null; then
            echo ""
            echo "ERROR: CHECKSUMS.sha256 is stale relative to the tracked files."
            echo ""
            echo "Committed manifest:"
            cat /tmp/CHECKSUMS.committed
            echo ""
            echo "Regenerated manifest:"
            cat /tmp/CHECKSUMS.regenerated
            echo ""
            echo "Diff:"
            diff /tmp/CHECKSUMS.committed /tmp/CHECKSUMS.regenerated || true
            echo ""
            echo "To fix locally: bash scripts/update-checksums.sh && git add CHECKSUMS.sha256 && git commit --amend --no-edit"
            echo ""
            exit 1
          fi
          echo "OK: committed CHECKSUMS.sha256 matches regenerated manifest."
